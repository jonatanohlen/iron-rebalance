system:
  name: IRON-REBALANCER
  version: "1.0.0"
  run_frequency: weekly

# LLM used only for report narration — not stock picking
llm:
  model: claude-sonnet-4-6
  temperature: 0.0

risk:
  max_single_weight: 0.08
  sector_cap: 0.25
  vol_target: 0.15
  max_correlation: 0.70
  kelly_max_fraction: 0.25
  trailing_stop_pct: 0.15
  lookback_days: 252
  min_adv_sek: 10_000_000
  max_data_gap_pct: 0.05
  top_n_candidates: 30

alpha:
  f_score_min: 7
  roic_3yr_min: 0.15
  momentum_lookback_months: 12
  momentum_skip_months: 1

